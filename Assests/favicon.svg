<svg width="512" height="512" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fire gradient matching our root styling -->
    <linearGradient id="sg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5e3a" />
      <stop offset="100%" stop-color="#ff2a6d" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded dark background -->
  <rect width="24" height="24" rx="6" fill="#08080c" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <!-- Stylized SG monogram path -->
  <g filter="url(#glow)">
    <!-- Letter S path -->
    <path d="M7 8.5C7 7.12 8.12 6 9.5 6h2C12.88 6 14 7.12 14 8.5v1c0 1.38-1.12 2.5-2.5 2.5h-1C9.12 12 8 13.12 8 14.5v1C8 16.88 9.12 18 10.5 18h2c1.38 0 2.5-1.12 2.5-2.5" 
          stroke="url(#sg-gradient)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Letter G path -->
    <path d="M17 10v4.5c0 1.93-1.57 3.5-3.5 3.5h-2M13.5 14H17" 
          stroke="url(#sg-gradient)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
